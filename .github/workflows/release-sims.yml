name: Release Sims
on:
  pull_request:
    branches:
      - "rc**"

jobs:
  cleanup-runs:
    runs-on: ubuntu-22.04
    steps:
      - uses: rokroskar/workflow-run-cleanup-action@master
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
    if: "!startsWith(github.ref, 'refs/tags/') && github.ref != 'refs/heads/main'"

  build:
    runs-on: ubuntu-22.04
    if: "!contains(github.event.head_commit.message, 'skip-sims')"
    steps:
      - uses: actions/checkout@v5
      - run: |
          make build

  newbuild:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: 1.25.7
          cache: true
          cache-dependency-path: go.sum
      - uses: actions/cache@v5
        with:
          path: ~/go/bin
          key: ${{ runner.os }}-go-runsim-binary-v1.0.0
      - name: Install runsim
        run: go install github.com/cosmos/tools/cmd/runsim@v1.0.0

  test-sim-nondeterminism:
    runs-on: ubuntu-22.04
    needs: newbuild
    # See sims.yml: a fixed -Seed forces numSeeds=1 so each matrix job runs a
    # single seed in parallel (~3x faster) with the same total coverage.
    # Seeds must be != 42 (simcli DefaultSeedValue).
    strategy:
      fail-fast: false
      matrix:
        seed: [1, 2, 3]
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: 1.25.7
          cache: true
          cache-dependency-path: go.sum
      - uses: technote-space/get-diff-action@v6.1.2
        with:
          PATTERNS: |
            **/**.go
            go.mod
            go.sum
      - uses: actions/cache@v5
        with:
          path: ~/go/bin
          key: ${{ runner.os }}-go-runsim-binary-v1.0.0
        if: "env.GIT_DIFF != ''"
      - name: test nondeterminism
        run: |
          make test-sim-nondeterminism SIM_SEED=${{ matrix.seed }}
        if: "env.GIT_DIFF != ''"
