name: Sims
on:
  workflow_call:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      
jobs:
  cleanup-runs:
    runs-on: ubuntu-22.04
    steps:
      - uses: rokroskar/workflow-run-cleanup-action@master
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
    if: "!startsWith(github.ref, 'refs/tags/') && github.ref != 'refs/heads/main'"

  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: 1.25.7
          cache: true
          cache-dependency-path: go.sum
      - uses: actions/cache@v5
        with:
          path: ~/go/bin
          key: ${{ runner.os }}-go-runsim-binary-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-runsim-binary-
      - name: Install runsim
        run: go install github.com/cosmos/tools/cmd/runsim@v1.0.0

  test-sim-nondeterminism:
    runs-on: ubuntu-22.04
    needs: build
    # TestAppStateDeterminism is CPU-bound, single-threaded, and re-runs the
    # full simulation numSeeds*numTimesToRunPerSeed (3*5=15) times. Passing a
    # fixed -Seed forces numSeeds=1, so each matrix job runs a single seed (5
    # runs) in parallel instead of all 15 sequentially in one job. This cuts
    # wall-clock ~3x while preserving total coverage. Seeds must be != 42
    # (simcli DefaultSeedValue), which would re-enable the internal 3-seed loop.
    strategy:
      fail-fast: false
      matrix:
        seed: [1, 2, 3]
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: 1.25.7
          cache: true
          cache-dependency-path: go.sum
      - uses: technote-space/get-diff-action@v6.0.1
        with:
          PATTERNS: |
            **/**.go
            go.mod
            go.sum
      - uses: actions/cache@v5
        with:
          path: ~/go/bin
          key: ${{ runner.os }}-go-runsim-binary-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-runsim-binary-
        if: "env.GIT_DIFF != ''"
      - name: test nondeterminism
        run: |
          make test-sim-nondeterminism SIM_SEED=${{ matrix.seed }}
        if: "env.GIT_DIFF != ''"



